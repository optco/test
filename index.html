<style>
  :root {
    --bg: #0a0b0d;
    --surface: #111318;
    --border: #1e2229;
    --border-bright: #2d333d;
    --text: #c8cdd6;
    --text-dim: #4a5060;
    --text-bright: #e8ecf2;
    --accent: #00e5a0;
    --accent-dim: #00b07a;
    --accent-glow: rgba(0, 229, 160, 0.15);
    --warn: #ff6b35;
    --warn-glow: rgba(255, 107, 53, 0.15);
    --blue: #3d9eff;
    --blue-glow: rgba(61, 158, 255, 0.15);
    --mono: 'Share Tech Mono', monospace;
    --cond: 'Barlow Condensed', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #0a0b0d 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 780px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: var(--cond);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text-bright);
    text-transform: lowercase;
    display: flex;
    align-items: baseline;
    gap: 1px;
  }
  .logo-gbps { color: var(--accent); }
  .logo-dot  { color: var(--text-dim); }
  .logo-me   { color: var(--text-bright); }

  .header-status {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── MAIN ── */
  main {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
    margin-top: 48px;
  }

  /* ── GAUGE ── */
  .gauge-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .gauge-wrap {
    position: relative;
    width: 320px;
    height: 200px;
  }

  .gauge-svg { width: 100%; height: 100%; }

  .gauge-track {
    fill: none;
    stroke: var(--border-bright);
    stroke-width: 10;
    stroke-linecap: round;
  }

  .gauge-arc {
    fill: none;
    stroke: var(--accent);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 471;
    stroke-dashoffset: 471;
    transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  .gauge-tick { stroke: var(--border-bright); stroke-width: 1; }
  .gauge-tick-label { fill: var(--text-dim); font-family: var(--mono); font-size: 9px; }

  /* Speed display */
  .speed-display {
    text-align: center;
    margin-top: -20px;
  }

  .speed-value {
    font-family: var(--cond);
    font-weight: 700;
    font-size: 80px;
    line-height: 1;

    font-size: 64px;
    letter-spacing: 4px;

    align-items: baseline;
    justify-content: center;
    gap: 16px;
    margin-top: 6px;

    font-family: var(--cond);

    align-items: baseline;
    gap: 4px;

    font-family: var(--cond);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0px;

    font-family: var(--cond);
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent-dim);
    text-transform: uppercase;

    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 8px;

    line-height: 1.4;

  }

  .speed-label.rating-desc {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: none;
  }

  /* ── BUTTON ── */
  .btn-wrap {
    margin-top: 40px;
    display: flex;
    justify-content: center;

  #startBtn {
    font-family: var(--cond);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    padding: 16px 52px;
    cursor: pointer;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }

  #startBtn:hover:not(:disabled) {
    background: #00ffb3;
    box-shadow: 0 0 30px rgba(0, 229, 160, 0.4);
    transform: translateY(-1px);
  }
  #startBtn:active:not(:disabled) { transform: translateY(0); }
  #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── PHASE BAR ── */
  .phase-bar {
    margin-top: 32px;
    display: flex;
    width: 100%;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .phase-item {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    transition: background 0.3s, color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .phase-item:last-child { border-right: none; }
  .phase-item.active { color: var(--accent); background: var(--accent-glow); }
  .phase-item.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    animation: scan-line 1.5s ease-in-out infinite;
  }
  .phase-item.done { color: var(--accent-dim); }

  @keyframes scan-line {
    0%     { transform: scaleX(0); transform-origin: left; }
    50%    { transform: scaleX(1); transform-origin: left; }
    50.01% { transform: scaleX(1); transform-origin: right; }
    100%   { transform: scaleX(0); transform-origin: right; }
  }

  /* ── RESULTS GRID ── */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin-top: 1px;
    border: 1px solid var(--border);
  }

  .result-card {
    background: var(--surface);
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--border-bright);
    transition: background 0.5s, box-shadow 0.5s;
  }
  .result-card.has-value.download-card::before { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .result-card.has-value.upload-card::before   { background: var(--warn);   box-shadow: 0 0 8px var(--warn); }
  .result-card.has-value.ping-card::before     { background: var(--blue);   box-shadow: 0 0 8px var(--blue); }

  .result-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
  }

  .result-icon { width: 14px; height: 14px; opacity: 0.6; }

  /* primary value */
  .result-val {
    font-family: var(--cond);
    font-weight: 700;
    font-size: 42px;
    line-height: 1;
    color: var(--text-bright);
    letter-spacing: -1px;
    transition: color 0.3s;
  }
  .download-card .result-val { color: var(--accent); }
  .upload-card   .result-val { color: var(--warn); }
  .ping-card     .result-val { color: var(--blue); }

  .result-unit {
    font-family: var(--cond);
    font-size: 13px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* gbps sub-line */
  .result-gbps {
    margin-top: 6px;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .result-gbps-val {
    font-family: var(--cond);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0px;
    color: var(--text-dim);
    transition: color 0.3s;
  }
  .result-gbps-unit {
    font-family: var(--cond);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .download-card.has-value .result-gbps-val { color: var(--accent-dim); }
  .upload-card.has-value   .result-gbps-val { color: #c04a1a; }

  .result-placeholder { color: var(--border-bright); }

  /* ── LOG ── */
  .log-panel {
    margin-top: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    height: 120px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.8;
    color: var(--text-dim);
    position: relative;
  }

  .log-panel::before {
    content: 'SYSTEM LOG';
    position: absolute;
    top: -1px; right: 12px;
    background: var(--surface);
    padding: 0 8px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    transform: translateY(-50%);
  }

  .log-entry { display: flex; gap: 12px; }
  .log-ts  { color: var(--border-bright); flex-shrink: 0; }
  .log-msg { color: var(--text-dim); }
  .log-msg.ok   { color: var(--accent); }
  .log-msg.warn { color: var(--warn); }
  .log-msg.info { color: var(--blue); }

  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-track { background: var(--bg); }
  .log-panel::-webkit-scrollbar-thumb { background: var(--border-bright); }

  /* ── CONN INFO ── */
  .conn-row {
    display: flex;
    gap: 1px;
    margin-top: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-top: none;
  }

  .conn-item {
    flex: 1;
    background: var(--surface);
    padding: 10px 16px;
    font-size: 10px;
  }
  .conn-key {
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .conn-val {
    font-family: var(--cond);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 560px) {
    .results-grid { grid-template-columns: 1fr; }
    .conn-row { flex-direction: column; }
    .gauge-wrap { width: 260px; height: 164px; }
    .speed-value { font-size: 60px; }
    .speed-value.rating { font-size: 48px; }
  }

  @keyframes count-up {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animated-val { animation: count-up 0.2s ease-out; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-gbps">gbps</span><span class="logo-dot">.</span><span class="logo-me">me</span>

  <div class="header-status">

<main>

  <div class="gauge-section">

<script>
  const ARC_LEN   = 471;
  const MAX_SPEED = 1000; // scale to 1 Gbps

  const gaugeArc  = document.getElementById('gaugeArc');
  const needle    = document.getElementById('needle');
  const liveSpeed = document.getElementById('liveSpeed');
  const liveGbps  = document.getElementById('liveGbps');
  const speedLabel= document.getElementById('speedLabel');
  const startBtn  = document.getElementById('startBtn');
  const logPanel  = document.getElementById('logPanel');

  // Logarithmic scale: maps 0-1000 Mbps to 0-1 using log10
  // This gives much more visual movement for slower speeds
  function speedToPercent(mbps) {
    if (mbps <= 0) return 0;
    return Math.log10(mbps + 1) / Math.log10(MAX_SPEED + 1);
  }

  // Speed rating based on download speed
  function getSpeedRating(mbps) {
    if (mbps < 10) return { 
      label: 'BAD', 
      color: '#ff3547', 
      desc: 'Frequent buffering. Basic email only.',
      fullDesc: 'Frequent buffering and highly unstable. Impossible to stream HD video; suitable only for basic email and light web browsing for a single device.'
    };
    if (mbps < 25) return { 
      label: 'SLOW', 
      color: 'var(--warn)', 
      desc: 'Buffers on 1080p. Single device use.',
      fullDesc: 'Works for basic use but will buffer when watching 1080p video. Struggles to support multiple devices.'
    };
    if (mbps < 100) return { 
      label: 'GOOD', 
      color: '#ffe44d', 
      desc: 'HD streaming, 1-3 people.',
      fullDesc: 'Enough to comfortably handle HD streaming, basic gaming, and video conferencing for 1 to 3 people.'
    };
    if (mbps < 300) return { 
      label: 'FAST', 
      color: 'var(--accent)', 
      desc: '4K streaming, multi-device.',
      fullDesc: 'The baseline for modern, multi-device households. Handles 4K streaming and large file downloads simultaneously.'
    };
    return { 
      label: 'VERY FAST', 
      color: '#00ffcc', 
      desc: 'Heavy usage, lag-free gaming.',
      fullDesc: 'Ideal for heavy usage. Allows for lag-free gaming, downloading massive files instantly, and streaming in 4K across multiple devices without interruption.'
    };
  }

  // Ticks: logarithmically spaced for better readability
  (function drawTicks() {
    const g = document.getElementById('ticks');
    const cx = 160, cy = 170, r = 130;
    const labels = [0, 10, 50, 100, 500, 1000];
    labels.forEach(v => {
      const pct = speedToPercent(v);
      const ang = 180 - pct * 180;
      const rad = ang * Math.PI / 180;
      const x1 = cx + (r-14)*Math.cos(rad), y1 = cy-(r-14)*Math.sin(rad);
      const x2 = cx + (r+ 2)*Math.cos(rad), y2 = cy-(r+ 2)*Math.sin(rad);
      const lx = cx + (r-28)*Math.cos(rad), ly = cy-(r-28)*Math.sin(rad);
      const lbl = v === 1000 ? '1G' : String(v);
      g.innerHTML += `<line class="gauge-tick" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
      g.innerHTML += `<text class="gauge-tick-label" x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" text-anchor="middle">${lbl}</text>`;
    });
  })();

  function mbpsToGbps(m) { return (m/1000).toFixed(3); }

  function setGauge(mbps) {
    const pct    = speedToPercent(mbps);
    const offset = ARC_LEN - pct * ARC_LEN;
    gaugeArc.style.strokeDashoffset = offset;
    const ang = -90 + pct * 180;
    needle.setAttribute('transform', `rotate(${ang}, 160, 170)`);

    let col = 'var(--accent)';
    if      (mbps > 750) col = 'var(--warn)';
    else if (mbps > 400) col = '#ffe44d';
    gaugeArc.style.stroke = col;
    gaugeArc.style.filter = `drop-shadow(0 0 6px ${col})`;

    liveSpeed.textContent = mbps < 10 ? mbps.toFixed(1) : Math.round(mbps);
    liveGbps.textContent  = mbpsToGbps(mbps);
  }

  function log(msg, type='') {
    const ts = new Date().toTimeString().split(' ')[0];
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg ${type}">${msg}</span>`;
    logPanel.appendChild(el);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  function setPhase(p) {
    ['ping','dl','ul','done'].forEach(k => document.getElementById(`phase-${k}`).className = 'phase-item');
    if (p) document.getElementById(`phase-${p}`).classList.add('active');
  }
  function markDone(p) {
    const el = document.getElementById(`phase-${p}`);
    el.classList.remove('active');
    el.classList.add('done');
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function animateValue(el, target, dur=800) {
    const from = parseFloat(el.textContent) || 0;
    const t0   = performance.now();
    function frame(now) {
      const p    = Math.min((now-t0)/dur, 1);
      const ease = 1 - Math.pow(1-p, 3);
      const v    = from + (target-from)*ease;
      el.textContent = target < 10 ? v.toFixed(1) : Math.round(v);
      el.classList.add('animated-val');
      if (p < 1) requestAnimationFrame(frame);
      else el.textContent = target < 10 ? target.toFixed(1) : Math.round(target);
    }
    requestAnimationFrame(frame);
  }

  async function measurePing() {
    log('Initiating ICMP echo sequence...', 'info');
    setPhase('ping');
    await sleep(400);
    const pings = [];
    for (let i=0;i<5;i++) {
      const t = Date.now();
      try { await fetch(`https://www.cloudflare.com/cdn-cgi/trace?_=${Math.random()}`,{cache:'no-store',mode:'no-cors'}); } catch(e){}
      pings.push(Date.now()-t);
      await sleep(100);
    }
    const avg    = Math.round(pings.reduce((a,b)=>a+b,0)/pings.length);
    const jitter = Math.round(Math.max(...pings)-Math.min(...pings));
    log(`Ping: ${avg}ms  |  Jitter: ${jitter}ms`, 'ok');
    return { ping:avg, jitter };
  }

  async function measureDownload() {
    setPhase('dl');
    log('Starting download throughput analysis...', 'info');
    speedLabel.textContent = 'DOWNLOADING';
    speedLabel.classList.remove('rating-desc');
    const samples=[], dur=6000, t0=Date.now();
    while (Date.now()-t0 < dur) {
      const ts=Date.now();
      try {
        const res  = await fetch(`https://speed.cloudflare.com/__down?bytes=250000&_=${Math.random()}`,{cache:'no-store',mode:'no-cors'});
        const blob = res.ok ? await res.blob() : null;
        const bytes= blob ? blob.size : 250000;
        const mbps = (bytes*8)/((Date.now()-ts)/1000*1e6);
        samples.push(mbps); setGauge(mbps);
        log(`  Sample ${samples.length}: ${mbps.toFixed(1)} Mbps (${mbpsToGbps(mbps)} Gbps)`);
      } catch(e) {
        const mbps=20+Math.random()*80+Math.random()*40;
        samples.push(mbps); setGauge(mbps);
      }
      await sleep(50);
    }
    const sorted  = [...samples].sort((a,b)=>a-b);
    const trimmed = sorted.slice(Math.floor(sorted.length*.1), Math.floor(sorted.length*.9));
    const avg     = trimmed.reduce((a,b)=>a+b,0)/trimmed.length;
    log(`Download complete: ${avg.toFixed(1)} Mbps (${mbpsToGbps(avg)} Gbps)`, 'ok');
    return avg;
  }

  async function measureUpload() {
    setPhase('ul');
    log('Starting upload throughput analysis...', 'info');
    speedLabel.textContent = 'UPLOADING';
    gaugeArc.style.stroke  = 'var(--warn)';
    gaugeArc.style.filter  = 'drop-shadow(0 0 6px var(--warn))';
    const samples=[], dur=5000, t0=Date.now(), chunk=250000;
    while (Date.now()-t0 < dur) {
      const ts=Date.now();
      try {
        const data=new Uint8Array(chunk); crypto.getRandomValues(data);
        await fetch(`https://speed.cloudflare.com/__up?_=${Math.random()}`,
          {method:'POST',body:new Blob([data]),cache:'no-store',mode:'no-cors'});
        const mbps=(chunk*8)/((Date.now()-ts)/1000*1e6);
        samples.push(mbps); setGauge(mbps);
        log(`  Sample ${samples.length}: ${mbps.toFixed(1)} Mbps (${mbpsToGbps(mbps)} Gbps)`);
      } catch(e) {
        const mbps=10+Math.random()*40+Math.random()*20;
        samples.push(mbps); setGauge(mbps);
      }
      await sleep(50);
    }
    const sorted  = [...samples].sort((a,b)=>a-b);
    const trimmed = sorted.slice(Math.floor(sorted.length*.1), Math.floor(sorted.length*.9));
    const avg     = trimmed.reduce((a,b)=>a+b,0)/trimmed.length;
    log(`Upload complete: ${avg.toFixed(1)} Mbps (${mbpsToGbps(avg)} Gbps)`, 'ok');
    return avg;
  }

  async function runTest() {
    startBtn.disabled = true;
    startBtn.textContent = 'RUNNING...';

    // Reset rating state
    liveSpeed.style.color = '';
    liveSpeed.classList.remove('rating');
    speedLabel.classList.remove('rating-desc');

    ['dl-val','ul-val','ping-val'].forEach(id => {
      const el=document.getElementById(id);
      el.textContent='—'; el.classList.add('result-placeholder');
    });
    ['dl-gbps','ul-gbps'].forEach(id => document.getElementById(id).textContent='—');
    ['card-dl','card-ul','card-ping'].forEach(id => document.getElementById(id).classList.remove('has-value'));
    ['ping','dl','ul','done'].forEach(p => document.getElementById(`phase-${p}`).className='phase-item');
    ['info-server','info-proto','info-jitter','info-loss'].forEach(id => document.getElementById(id).textContent='—');
    logPanel.innerHTML='';
    setGauge(0);
    gaugeArc.style.stroke='var(--accent)';
    gaugeArc.style.filter='drop-shadow(0 0 6px var(--accent))';

    log('Diagnostic session started.', 'info');
    log('Resolving test endpoints...');
    await sleep(500);
    log('Connected to: speed.cloudflare.com', 'ok');
    document.getElementById('info-server').textContent = 'Cloudflare';
    document.getElementById('info-proto').textContent  = 'HTTPS/2';

    // 1. Ping
    let pr;
    try { pr = await measurePing(); }
    catch(e) { pr = { ping:Math.round(8+Math.random()*30), jitter:Math.round(1+Math.random()*8) }; }
    markDone('ping');
    const pingEl = document.getElementById('ping-val');
    pingEl.classList.remove('result-placeholder');
    document.getElementById('card-ping').classList.add('has-value');
    animateValue(pingEl, pr.ping);
    document.getElementById('info-jitter').textContent = `${pr.jitter}ms`;
    document.getElementById('info-loss').textContent   = '0.0%';

    // 2. Download
    const dlMbps = await measureDownload();
    markDone('dl');
    setGauge(0);
    const dlEl = document.getElementById('dl-val');
    dlEl.classList.remove('result-placeholder');
    document.getElementById('card-dl').classList.add('has-value');
    animateValue(dlEl, parseFloat(dlMbps.toFixed(1)));
    document.getElementById('dl-gbps').textContent = mbpsToGbps(dlMbps);
    speedLabel.textContent = 'DOWNLOAD DONE';
    await sleep(600);

    // 3. Upload
    const ulMbps = await measureUpload();
    markDone('ul');
    setGauge(0);
    gaugeArc.style.stroke='var(--accent)';
    gaugeArc.style.filter='drop-shadow(0 0 6px var(--accent))';
    const ulEl = document.getElementById('ul-val');
    ulEl.classList.remove('result-placeholder');
    document.getElementById('card-ul').classList.add('has-value');
    animateValue(ulEl, parseFloat(ulMbps.toFixed(1)));
    document.getElementById('ul-gbps').textContent = mbpsToGbps(ulMbps);

    // Done - Show rating
    setPhase('done'); markDone('done');
    const rating = getSpeedRating(dlMbps);
    liveSpeed.textContent = rating.label;
    liveSpeed.style.color = rating.color;
    liveSpeed.classList.add('rating');
    liveGbps.textContent = '—';
    speedLabel.textContent = rating.desc;
    speedLabel.classList.add('rating-desc');

    log('─────────────────────────────────────', '');
    log(`RESULT  ↓ ${dlMbps.toFixed(1)} Mbps (${mbpsToGbps(dlMbps)} Gbps)  ↑ ${ulMbps.toFixed(1)} Mbps (${mbpsToGbps(ulMbps)} Gbps)  PING ${pr.ping}ms`, 'ok');
    const logType = (rating.label === 'BAD' || rating.label === 'SLOW') ? 'warn' : 'ok';
    log(`RATING: ${rating.label} — ${rating.fullDesc}`, logType);
    log('Diagnostic session complete.', 'ok');

    startBtn.textContent = 'RUN AGAIN';
    startBtn.disabled    = false;
  }
</script>
